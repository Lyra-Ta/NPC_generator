name: Verify release and purge jsDelivr

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jsdelivr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-purge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build release artifacts
        run: pnpm build

      - name: Verify committed release artifacts
        run: git diff --exit-code -- dist/index.js dist/index.js.LICENSE.txt 酒馆助手脚本-npc生成器.json

      - name: Purge jsDelivr branch cache
        env:
          JSDELIVR_REF: main
        run: pnpm purge:jsdelivr
